<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>JPG (Raster) vs SVG (Vector) al 300%</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0b1630;
      color: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    .contenedor {
      display: flex;
      gap: 40px;
      justify-content: center;
      align-items: flex-start;
    }
    .columna {
      background: #111b3a;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
    }
    .columna h2 {
      margin-top: 0;
      margin-bottom: 15px;
    }
    .etiqueta {
      margin-top: 10px;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .img-100 {
      width: 100px;
      height: auto;
      border-radius: 4px;
    }
    .img-300 {
      width: 300px; /* 300% de 100px */
      height: auto;
      border-radius: 4px;
    }
    .svg-100 {
      width: 100px;
      height: 100px;
    }
    .svg-300 {
      width: 300px; /* 300% de 100px */
      height: 300px;
    }
  </style>
</head>
<body>
  <h1>JPG (Raster) vs SVG (Vector) al 300%</h1>

  <div class="contenedor">
    <!-- Columna JPG / Mapa de bits -->
    <div class="columna">
      <h2>JPG (Mapa de Bits)</h2>

      <div class="etiqueta">Original (100px)</div>
      <img src="foto-pequena.jpg" alt="Foto pequeña" class="img-100">

      <div class="etiqueta">Ampliado al 300%</div>
      <img src="foto-pequena.jpg" alt="Foto ampliada 300%" class="img-300">
    </div>

    <!-- Columna SVG / Vectorial -->
    <div class="columna">
      <h2>SVG (Vectorial)</h2>

      <div class="etiqueta">Original (100px)</div>
      <svg class="svg-100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="40" fill="#e53935" stroke="#000" stroke-width="4" />
      </svg>

      <div class="etiqueta">Ampliado al 300%</div>
      <svg class="svg-300" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="40" fill="#e53935" stroke="#000" stroke-width="4" />
      </svg>
    </div>
  </div>
</body>
</html>
