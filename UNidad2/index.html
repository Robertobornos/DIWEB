<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Unidad 2 – DIWEB</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      color: #333;
    }

    header {
      background: #1e88e5;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.2rem;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    h2 {
      color: #1e88e5;
    }

    a {
      color: #1e88e5;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<header>
  <h1>Unidad 2 – Actividades</h1>
</header>

<div class="container">

  <!-- ACTIVIDADES -->
  <!-- Puedes copiar/pegar este bloque para nuevas actividades -->

  <!-- Generadas automáticamente -->
  <script>
    const container = document.currentScript.parentElement;

    for (let i = 1; i <= 29; i++) {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h2>Actividad ${i}</h2>
        <p>Accede a la actividad ${i} de esta unidad.</p>
        <a href="actividad${i}/actividad${i}.html">
          Entrar a la Actividad ${i} →
        </a>
      `;

      container.appendChild(card);
    }
  </script>

  <!-- ARCHIVO XML -->
  <div class="card">
    <h2>Archivo lpl.xml</h2>
    <p>Descargar archivo lpl.xml.</p>
    <a href="lpl.xml">Descargar lpl.xml →</a>
  </div>

  <a href="../index.html">← Volver al inicio</a>

</div>

</body>
</html>
