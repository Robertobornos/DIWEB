<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Position</title>
    <link rel="stylesheet" href="position.css">
</head>
<body>

<h1>Tipos de position</h1>

<div class="contenedor">

    <div class="caja static">
        <h3>Static</h3>
        <p>Comportamiento por defecto, sigue el flujo normal.</p>
    </div>

    <div class="caja relative">
        <h3>Relative</h3>
        <p>Se desplaza desde su posición original.</p>
    </div>

    <div class="caja absolute">
        <h3>Absolute</h3>
        <p>Se posiciona respecto al contenedor.</p>
    </div>

    <div class="caja sticky">
        <h3>Sticky</h3>
        <p>Se mantiene visible al hacer scroll.</p>
    </div>

</div>

<div class="caja fixed">
    <h3>Fixed</h3>
    <p>Permanece fijo en la pantalla.</p>
</div>

<div class="espacio"></div>

</body>
</html>
