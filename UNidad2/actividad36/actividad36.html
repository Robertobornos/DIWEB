<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicio 36</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 40px;
}

.contenedor {
    width: 80%;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
}

.bloque-centrado {
    width: 300px;
    background: #4da3ff;
    color: white;
    padding: 20px;
    margin: 20px auto;
    text-align: center;
}

.texto-centrado {
    background: #e8e8e8;
    padding: 20px;
    text-align: center;
    margin-bottom: 30px;
}

.imagen-centrada {
    display: block;
    margin: 20px auto;
    width: 140px;
    height: 140px;
    background: #ccc;
}

.fila {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
}

.izquierda {
    background: #7ed957;
    padding: 15px;
    width: 45%;
}

.derecha {
    background: #ff6b6b;
    padding: 15px;
    width: 45%;
    text-align: right;
}

.vertical {
    background: #b57bff;
    height: 120px;
    line-height: 120px;
    text-align: center;
    margin-top: 30px;
}
</style>
</head>
<body>

<div class="contenedor">

    <div class="bloque-centrado">Elemento de Bloque Centrado</div>

    <div class="texto-centrado">Este texto está centrado dentro de este contenedor.</div>

    <div class="imagen-centrada"></div>

    <div class="fila">
        <div class="izquierda">Alineado a la Izquierda</div>
        <div class="derecha">Alineado a la Derecha</div>
    </div>

    <div class="vertical">Texto Centrado Verticalmente</div>

</div>

</body>
</html>
